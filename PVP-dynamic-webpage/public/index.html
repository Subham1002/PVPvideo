<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntak Media — Dynamic Production Strategy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 1. Import Inter Tight from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- 2. Tell Tailwind to use it as the default sans font -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Inter Tight"', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        .plyr { 
            border-radius: 1rem; 
            overflow: hidden; 
            border: 1px solid #e2e8f0; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); 
            height: 100%;
        }
        #my-cal-inline-10min iframe {
            border-radius: 0.75rem;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen selection:bg-blue-600 selection:text-white flex flex-col items-center">

    <!-- Minimal Header Navigation -->
    <header class="w-full max-w-6xl mx-auto px-4 py-4 flex justify-between items-center relative z-20">
        <!-- Syntak Media Logo -->
        <a href="https://syntakmedia.com" target="_blank" rel="noopener noreferrer" class="transition-opacity opacity-90 hover:opacity-100">
            <img src="https://res.cloudinary.com/djad0esel/image/upload/v1784249167/syntak-emailSignature_wojcun.webp" alt="Syntak Media" class="h-6 md:h-8 object-contain">
        </a>

        <!-- Ghost Booking Button -->
        <a href="#booking-section" class="text-xs md:text-sm font-semibold text-slate-600 hover:text-slate-900 bg-transparent border border-slate-300 hover:border-slate-400 hover:bg-slate-100 px-4 md:px-5 py-2 rounded-full transition-all">
            Book a Call
        </a>
    </header>

    <!-- Main Viewport-Fitted Content Wrapper -->
    <main class="w-full max-w-6xl mx-auto px-4 py-2 md:py-4 flex flex-col items-center justify-start flex-grow text-center">
        
        <!-- Header Matrix -->
        <div class="space-y-3 flex flex-col items-center mt-2 max-w-4xl">
            <!-- Single High-Impact Title -->
            <h1 class="text-3xl md:text-4xl lg:text-5xl font-extrabold tracking-wide text-slate-900 leading-tight">
                <span class="text-blue-600">{{PROSPECT_NAME}} team</br></span>
            </h1>
            <h2 class="text-2xl md:text-4xl lg:text-5xl font-bold tracking-wide text-slate-900 leading-tight">
                I built a tailored blueprint to scale your organic lead acquisition.
            </h2>
        </div>

<!-- High-Impact Directional Pointer (No Text) -->
<div class="flex flex-col items-center mt-4 mb-4">
    <svg class="w-7 h-10 text-blue-600 opacity-50 drop-shadow-sm animate-bounce" fill="currentColor" viewBox="0 0 384 512">
        <path d="M169.4 470.6c12.5 12.5 32.8 12.5 45.3 0l160-160c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L224 370.8 224 64c0-17.7-14.3-32-32-32s-32 14.3-32 32l0 306.7L54.6 265.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3l160 160z"/>
    </svg>
</div>

        <!-- Viewport-Optimized Video Area -->
        <!-- The inline style ensures it never exceeds 65% of screen height, guaranteeing it stays above the fold -->
        <div class="relative w-full mx-auto" style="max-height: 65vh; aspect-ratio: 16/9; max-width: 100%;">
            
            <!-- Server Error/Loading Overlay -->
            <div id="loading-state" class="absolute inset-0 flex items-center justify-center bg-slate-100 rounded-2xl border border-slate-200 z-10 animate-pulse" style="display: {{LOADING_DISPLAY}}">
                <p class="text-red-500 font-mono text-sm tracking-wider font-semibold">{{ERROR_MESSAGE}}</p>
            </div>

            <!-- Main Stream Canvas -->
            <div style="display: {{VIDEO_DISPLAY}}" class="w-full h-full">
                <video id="player" playsinline controls>
                    <source src="{{VIDEO_URL}}" type="video/mp4" />
                </video>
            </div>
        </div>

        <!-- Sleek LinkedIn Badge Moved Below Video -->
        <div class="mt-6 mb-8">
            <a href="https://www.linkedin.com/in/subham-kanoo/" target="_blank" rel="noopener noreferrer" class="inline-flex items-center space-x-2 bg-[#0a66c2] hover:bg-[#004182] text-white px-5 py-2 rounded-full text-xs font-semibold tracking-wide transition-all shadow-sm transform hover:-translate-y-0.5">
                <span>Connect with me on LinkedIn</span>
                <svg class="h-3.5 w-3.5 fill-current" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
            </a>
        </div>
    </main>

    <!-- Interactive Conversion Area -->
    <section id="booking-section" class="w-full max-w-4xl mx-auto px-4 pb-16 pt-8 text-center space-y-6">
        <div class="space-y-2">
            <h2 class="text-2xl md:text-3xl font-extrabold text-slate-900">
                Ready to optimize your production workflow?
            </h2>
            <p class="text-slate-500 text-sm max-w-md mx-auto">
                Lock in a brief walkthrough session using the calendar matrix below.
            </p>
        </div>

        <!-- Cal.com Booking Matrix Container -->
        <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-xl p-2 min-h-[550px]">
            <!-- Cal inline embed code begins -->
            <div style="width:100%;height:100%;overflow:scroll" id="my-cal-inline-10min"></div>
            <script type="text/javascript">
              (function (C, A, L) { let p = function (a, ar) { a.q.push(ar); }; let d = C.document; C.Cal = C.Cal || function () { let cal = C.Cal; let ar = arguments; if (!cal.loaded) { cal.ns = {}; cal.q = cal.q || []; d.head.appendChild(d.createElement("script")).src = A; cal.loaded = true; } if (ar[0] === L) { const api = function () { p(api, arguments); }; const namespace = ar[1]; api.q = api.q || []; if(typeof namespace === "string"){cal.ns[namespace] = cal.ns[namespace] || api;p(cal.ns[namespace], ar);p(cal, ["initNamespace", namespace]);} else p(cal, ar); return;} p(cal, ar); }; })(window, "https://app.cal.com/embed/embed.js", "init");
              Cal("init", "10min", {origin:"https://app.cal.com"});
              Cal.config = Cal.config || {};
              Cal.config.forwardQueryParams = true;
            
              Cal.ns["10min"]("inline", {
                elementOrSelector:"#my-cal-inline-10min",
                config: {"layout":"month_view","useSlotsViewOnSmallScreen":"true"},
                calLink: "syntak-media/10min",
              });
            
              Cal.ns["10min"]("ui", {"hideEventTypeDetails":false,"layout":"month_view"});
            </script>
            <!-- Cal inline embed code ends -->
        </div>
    </section>

    <!-- Invisible Behavioral Analytics Transmission Architecture -->
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const player = new Plyr('#player', {
                controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen']
            });

            const prospectId = window.location.pathname.split('/').filter(Boolean).pop();
            let lastTrackedTime = 0;

            function sendAnalytics(eventName, forceSync = false) {
                const payload = JSON.stringify({
                    uniqueId: prospectId,
                    event: eventName,
                    currentTime: Math.round(player.currentTime || lastTrackedTime)
                });

                if (forceSync && navigator.sendBeacon) {
                    navigator.sendBeacon('/api/track', new Blob([payload], { type: 'application/json' }));
                } else {
                    fetch('/api/track', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: payload
                    }).catch(() => {});
                }
            }

            sendAnalytics('Opened Page');
            player.once('play', () => sendAnalytics('Started Video'));

            player.on('timeupdate', () => {
                const currentSec = Math.round(player.currentTime);
                lastTrackedTime = player.currentTime;
                if (currentSec > 0 && currentSec % 10 === 0 && currentSec !== player.lastPingedTime) {
                    sendAnalytics(`Watched ${currentSec}s`);
                    player.lastPingedTime = currentSec;
                }
            });

            player.on('ended', () => sendAnalytics('Finished Video'));
            window.addEventListener('pagehide', () => sendAnalytics('Left Page', true));
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'hidden') {
                    sendAnalytics('Tab Hidden/Left Page', true);
                }
            });
        });
    </script>
</body>
</html>
